services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-porfacan}
      POSTGRES_USER: ${POSTGRES_USER:-porfacan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-porfacan}
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-porfacan}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-porfacan}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-porfacan}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - web
      - redis
      - rabbitmq
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - web
      - redis
      - rabbitmq
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
