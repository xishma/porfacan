services:
  migrations:
    container_name: porfacan-migrations
    build:
      context: .
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    container_name: porfacan-web
    build: .
    command: sh -c "python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    container_name: porfacan-db
    image: postgres:16
    env_file:
      - .env
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-porfacan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: porfacan-redis
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    container_name: porfacan-rabbitmq
    image: rabbitmq:3-management
    env_file:
      - .env
    volumes:
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  celery-worker:
    container_name: porfacan-celery-worker
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-beat:
    container_name: porfacan-celery-beat
    build: .
    command: sh -c "until python manage.py shell -c \"from django.db import connection; c = connection.cursor(); c.execute(\\\"SELECT to_regclass('public.django_celery_beat_crontabschedule')\\\"); import sys; sys.exit(0 if c.fetchone()[0] else 1)\"; do sleep 2; done; celery -A config beat -l info"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

