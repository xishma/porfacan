version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-porfacan}
      POSTGRES_USER: ${POSTGRES_USER:-porfacan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-porfacan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  celery-worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
      - rabbitmq

  celery-beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
      - rabbitmq

volumes:
  postgres_data:
