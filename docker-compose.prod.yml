services:
  migrations:
    container_name: porfacan-migrations
    image: "${APP_IMAGE}"
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput"
    volumes:
      - ./environments:/app/environments/
    restart: "no"

  web:
    container_name: porfacan-web
    image: "${APP_IMAGE}"
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS}
    ports:
      - "8000:8000"
    volumes:
      - ./environments:/app/environments/
    restart: unless-stopped

  celery-worker:
    container_name: porfacan-celery-worker
    image: "${APP_IMAGE}"
    command: celery -A config worker -l info
    volumes:
      - ./environments:/app/environments/
    restart: unless-stopped
