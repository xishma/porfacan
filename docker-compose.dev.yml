services:
  web:
    container_name: porfacan-web
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    container_name: porfacan-db
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-porfacan}
      POSTGRES_USER: ${POSTGRES_USER:-porfacan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-porfacan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-porfacan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: porfacan-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    container_name: porfacan-rabbitmq
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-porfacan}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-porfacan}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-porfacan}
    volumes:
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  celery-worker:
    container_name: porfacan-celery-worker
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-beat:
    container_name: porfacan-celery-beat
    build: .
    command: sh -c "until python manage.py shell -c \"from django.db import connection; c = connection.cursor(); c.execute(\\\"SELECT to_regclass('public.django_celery_beat_crontabschedule')\\\"); import sys; sys.exit(0 if c.fetchone()[0] else 1)\"; do sleep 2; done; celery -A config beat -l info"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-porfacan}:${RABBITMQ_PASSWORD:-porfacan}@rabbitmq:5672/${RABBITMQ_VHOST:-porfacan}
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
