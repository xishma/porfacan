{% extends "base.html" %}

{% block title %}تعریف جدید | پرفکان{% endblock title %}

{% block content %}
<section class="mx-auto max-w-2xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="mb-2 text-xl font-semibold">افزودن تعریف برای «{{ entry.headword }}»</h1>
    <p class="mb-4 text-sm text-slate-500">محتوا پیش از ذخیره با Hazm نرمال‌سازی می‌شود.</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="rounded-lg bg-slate-900 ps-4 pe-4 py-2 text-white">ثبت تعریف</button>
    </form>
</section>
{% endblock content %}
