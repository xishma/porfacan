{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ page.title }} | {% trans "Porfacan" %}{% endblock title %}

{% block content %}
<article class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <header class="mb-4 border-b border-slate-100 pb-4">
        <h1 class="text-2xl font-bold">{{ page.title }}</h1>
    </header>
    <div class="lexicon-page-content max-w-none text-slate-900">
        {{ page.content|safe }}
    </div>
</article>
{% endblock content %}
