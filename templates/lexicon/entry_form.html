{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Create or edit entry" %} | {% trans "Porfacan" %}{% endblock title %}

{% block content %}
<section class="mx-auto max-w-2xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="mb-4 text-xl font-semibold">{% trans "Entry form" %}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="rounded-lg bg-slate-900 ps-4 pe-4 py-2 text-white">{% trans "Save" %}</button>
    </form>
</section>
{% endblock content %}
