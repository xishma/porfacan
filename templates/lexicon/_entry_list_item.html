{% load i18n %}
<article class="flex flex-row items-stretch gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="min-w-0 flex-1">
        <h2 class="text-lg font-semibold">
            <a href="{% url 'lexicon:entry-detail' entry.slug %}" class="hover:underline">{{ entry.headword }}</a>
        </h2>
        <p class="text-sm text-slate-500">
            {% trans "Epochs" %}:
            {% for epoch in entry.epochs.all %}
                {{ epoch.name }}{% if not forloop.last %}, {% endif %}
            {% empty %}
                -
            {% endfor %}
        </p>
    </div>
    {% if entry.category_id %}
        <a
            href="{% url 'lexicon:entry-list' %}?category={{ entry.category.slug|urlencode }}"
            class="inline-flex shrink-0 items-center self-start rounded-lg border border-violet-200 bg-violet-50 px-2.5 py-1.5 text-xs font-medium text-violet-900 transition hover:border-violet-300 hover:bg-violet-100"
        >
            {{ entry.category.name }}
        </a>
    {% endif %}
</article>
