name: Build and Deploy Staging

on:
  push:
    branches:
      - master

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup local settings
        run: |
          mkdir -p envs
          cp envs.example/settings.py envs/settings.py

      - name: Run tests
        run: docker compose -f docker-compose-ci.yml run --rm --build web pytest

      - name: Cleanup
        if: always()
        run: |
          rm -f envs/settings.py
          rm -f ~/.ssh/id_rsa

  build:
    needs: test
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/app:staging
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/app:staging-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/app:staging-buildcache,mode=max

  deploy:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug environment variables
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
        run: |
          echo "SSH_PORT from vars context: '${{ vars.SSH_PORT }}'"
          echo "SSH_PORT env variable: '${SSH_PORT}'"
          echo "SSH_PORT length: ${#SSH_PORT}"
          echo "SSH_PORT hex dump:"
          echo -n "${SSH_PORT}" | xxd || echo "No xxd available"
          if [ -z "${SSH_PORT}" ]; then
            echo "ERROR: SSH_PORT is empty or not set!"
            echo "Please configure SSH_PORT in GitHub Settings → Environments → staging → Variables"
            exit 1
          fi
          echo "DEPLOY_USER set: ${{ secrets.DEPLOY_USER != '' }}"
          echo "STAGING_DOMAIN set: ${{ secrets.STAGING_DOMAIN != '' }}"

      - name: Setup environment
        run: |
          export APP_IMAGE=ghcr.io/${{ github.repository }}/app:staging
          export CI_REGISTRY_USER=${{ github.actor }}
          export CI_JOB_TOKEN=${{ secrets.GHCR_TOKEN }}
          export CI_REGISTRY=ghcr.io
          export USER=${{ secrets.DEPLOY_USER }}
          export DOMAIN=${{ secrets.STAGING_DOMAIN }}
          export PORT=${{ vars.SSH_PORT }}
          chmod +x ./setup_env.sh
          bash ./setup_env.sh

      - name: Setup SSH for deployment
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
          STAGING_PRIVATE_KEY: ${{ secrets.STAGING_PRIVATE_KEY }}
        run: |
          # Trim whitespace
          SSH_PORT=$(echo "${SSH_PORT}" | xargs)
          echo "Using SSH_PORT: ${SSH_PORT}"
          if [ -z "${SSH_PORT}" ]; then
            echo "ERROR: SSH_PORT is not configured"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${STAGING_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT}" -H "${STAGING_DOMAIN}" >> ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
        run: |
          # Trim whitespace
          SSH_PORT=$(echo "${SSH_PORT}" | xargs)
          echo "Deploying with SSH_PORT: ${SSH_PORT}"
          if [ -z "${SSH_PORT}" ]; then
            echo "ERROR: SSH_PORT is not configured"
            exit 1
          fi
          chmod +x ./deploy.sh
          scp -P "${SSH_PORT}" -o StrictHostKeyChecking=no ./.env ./docker-compose.prod.yml ${DEPLOY_USER}@${STAGING_DOMAIN}:~/porfacan
          export PORT="${SSH_PORT}"
          export USER="${DEPLOY_USER}"
          export DOMAIN="${STAGING_DOMAIN}"
          bash ./deploy.sh

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
