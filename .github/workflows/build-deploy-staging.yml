name: Build and Deploy Staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: porfacan
          POSTGRES_USER: porfacan
          POSTGRES_PASSWORD: porfacan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U porfacan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 6
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      POSTGRES_DB: porfacan
      POSTGRES_USER: porfacan
      POSTGRES_PASSWORD: porfacan
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements/local.txt

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Setup local settings override
        run: cp envs.example/settings.py envs/settings.py

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest

      - name: Cleanup settings override
        if: always()
        run: rm -f envs/settings.py

  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/app:staging
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/app:staging-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/app:staging-buildcache,mode=max

  deploy:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
          STAGING_PRIVATE_KEY: ${{ secrets.STAGING_PRIVATE_KEY }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          mkdir -p ~/.ssh
          echo "${STAGING_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" -H "${STAGING_DOMAIN}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          DEPLOY_PATH=${DEPLOY_PATH:-~/porfacan}
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${STAGING_DOMAIN}" "mkdir -p ${DEPLOY_PATH}"
          scp -P "${SSH_PORT}" "./docker-compose.prod.yml" "${DEPLOY_USER}@${STAGING_DOMAIN}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy to staging
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_IMAGE: ghcr.io/${{ github.repository }}/app:staging
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          DEPLOY_PATH=${DEPLOY_PATH:-~/porfacan}
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${STAGING_DOMAIN}" "\
            set -eu; \
            cd ${DEPLOY_PATH}; \
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin; \
            printf 'APP_IMAGE=${APP_IMAGE}\n' > .env; \
            docker compose -f docker-compose.prod.yml pull; \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
