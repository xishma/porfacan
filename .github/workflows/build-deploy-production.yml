name: Build and Deploy Production

on:
  push:
    branches:
      - release-*
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup local settings override
        run: |
          mkdir -p envs
          cp envs.example/settings.py envs/settings.py
          sed -i 's/"HOST": "porfacan-db"/"HOST": "db"/' envs/settings.py

      - name: Build CI images
        run: docker compose -f docker-compose.yml build

      - name: Start CI infrastructure
        run: docker compose -f docker-compose.yml up -d db redis rabbitmq

      - name: Run migrations
        run: docker compose -f docker-compose.yml run --rm web python manage.py migrate --noinput

      - name: Run tests
        run: docker compose -f docker-compose.yml run --rm web pytest

      - name: Cleanup settings override
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v --remove-orphans
          rm -f envs/settings.py

  build:
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      docker_tag: ${{ steps.version.outputs.DOCKER_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from branch
        id: version
        run: echo "DOCKER_TAG=${GITHUB_REF_NAME#release-}" >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:${{ steps.version.outputs.DOCKER_TAG }}
            ghcr.io/${{ github.repository }}/app:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/app:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/app:buildcache,mode=max

  deploy-production:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          PRODUCTION_PRIVATE_KEY: ${{ secrets.PRODUCTION_PRIVATE_KEY }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          mkdir -p ~/.ssh
          echo "${PRODUCTION_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" -H "${PRODUCTION_DOMAIN}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          DEPLOY_PATH=${DEPLOY_PATH:-~/porfacan}
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${PRODUCTION_DOMAIN}" "mkdir -p ${DEPLOY_PATH}"
          scp -P "${SSH_PORT}" "./docker-compose.prod.yml" "${DEPLOY_USER}@${PRODUCTION_DOMAIN}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy to production
        env:
          SSH_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_IMAGE: ghcr.io/${{ github.repository }}/app:${{ needs.build.outputs.docker_tag }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          SSH_PORT=$(echo "${SSH_PORT:-22}" | xargs)
          DEPLOY_PATH=${DEPLOY_PATH:-~/porfacan}
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${PRODUCTION_DOMAIN}" "\
            set -eu; \
            cd ${DEPLOY_PATH}; \
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin; \
            printf 'APP_IMAGE=${APP_IMAGE}\n' > .env; \
            docker compose -f docker-compose.prod.yml pull; \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/id_rsa
